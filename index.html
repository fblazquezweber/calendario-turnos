<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario de Turnos</title>
  <link rel="stylesheet" href="assets/css/calendario_turnos.css" />
</head>
<body>
  <div class="contenedor">
    <h1>Calendario de Turnos</h1>

    <div class="barra-superior">
      <button id="mesAnterior">◀</button>
      <h2 id="tituloMes"></h2>
      <button id="mesSiguiente">▶</button>
    </div>

    <div class="leyenda">
      <div><span class="color trabajo"></span> Francisco</div>
      <div><span class="color libre"></span> Miguel</div>
      <div><span class="color vacio"></span> Sin marcar</div>
    </div>


    <div class="dias-semana">
      <div>Lun</div>
      <div>Mar</div>
      <div>Mié</div>
      <div>Jue</div>
      <div>Vie</div>
      <div>Sáb</div>
      <div>Dom</div>
    </div>

    <div id="calendario" class="calendario"></div>

    <div class="acciones">
      <button id="limpiarMes">Limpiar mes</button>
      <button id="exportarTexto">Exportar mes en texto</button>
    </div>

    <textarea id="salidaTexto" readonly placeholder="Aquí aparecerá el resumen del mes..."></textarea>
  </div>

  <script src="assets/js/calendario_turnos.js"></script>
</body>
</html>
